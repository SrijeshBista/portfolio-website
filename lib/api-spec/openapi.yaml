openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Srijesh Bista Portfolio API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Admin authentication
  - name: projects
    description: Portfolio projects
  - name: contacts
    description: Contact form submissions
  - name: profile
    description: Admin profile and site content
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: adminLogin
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/me:
    get:
      operationId: getAdminMe
      tags: [auth]
      summary: Get current admin info
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Admin info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "401":
          description: Unauthorized

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a project (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a single project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update a project (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /contacts:
    get:
      operationId: listContacts
      tags: [contacts]
      summary: List contact submissions (admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Contact submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contact"
    post:
      operationId: submitContact
      tags: [contacts]
      summary: Submit a contact form message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"

  /contacts/{id}:
    delete:
      operationId: deleteContact
      tags: [contacts]
      summary: Delete a contact message (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get site profile/content
      responses:
        "200":
          description: Profile data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
    patch:
      operationId: updateProfile
      tags: [profile]
      summary: Update profile/hero/about content (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  /stats:
    get:
      operationId: getSiteStats
      tags: [profile]
      summary: Get site stats (project count, contact count)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Site statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteStats"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    LoginInput:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        admin:
          $ref: "#/components/schemas/AdminUser"
      required: [token, admin]

    AdminUser:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
      required: [id, username]

    Project:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        imageUrl:
          type: ["string", "null"]
        liveUrl:
          type: ["string", "null"]
        githubUrl:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string
        featured:
          type: boolean
        sortOrder:
          type: integer
        createdAt:
          type: string
      required: [id, title, description, featured, sortOrder, createdAt, tags]

    ProjectInput:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        imageUrl:
          type: string
        liveUrl:
          type: string
        githubUrl:
          type: string
        tags:
          type: array
          items:
            type: string
        featured:
          type: boolean
        sortOrder:
          type: integer
      required: [title, description]

    ProjectUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        imageUrl:
          type: string
        liveUrl:
          type: string
        githubUrl:
          type: string
        tags:
          type: array
          items:
            type: string
        featured:
          type: boolean
        sortOrder:
          type: integer

    Contact:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        message:
          type: string
        createdAt:
          type: string
        read:
          type: boolean
      required: [id, name, email, message, createdAt, read]

    ContactInput:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        message:
          type: string
      required: [name, email, message]

    Profile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        title:
          type: string
        heroHeadline:
          type: string
        heroSubheading:
          type: string
        bio:
          type: string
        photoUrl:
          type: ["string", "null"]
        cvUrl:
          type: ["string", "null"]
        githubUrl:
          type: ["string", "null"]
        linkedinUrl:
          type: ["string", "null"]
        twitterUrl:
          type: ["string", "null"]
        experience:
          type: string
        skills:
          type: array
          items:
            $ref: "#/components/schemas/SkillCategory"
      required: [id, name, title, heroHeadline, heroSubheading, bio, experience, skills]

    ProfileUpdate:
      type: object
      properties:
        name:
          type: string
        title:
          type: string
        heroHeadline:
          type: string
        heroSubheading:
          type: string
        bio:
          type: string
        photoUrl:
          type: string
        cvUrl:
          type: string
        githubUrl:
          type: string
        linkedinUrl:
          type: string
        twitterUrl:
          type: string
        experience:
          type: string
        skills:
          type: array
          items:
            $ref: "#/components/schemas/SkillCategory"

    SkillCategory:
      type: object
      properties:
        category:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/SkillItem"
      required: [category, items]

    SkillItem:
      type: object
      properties:
        name:
          type: string
        level:
          type: integer
      required: [name, level]

    SiteStats:
      type: object
      properties:
        projectCount:
          type: integer
        contactCount:
          type: integer
        unreadContactCount:
          type: integer
      required: [projectCount, contactCount, unreadContactCount]
